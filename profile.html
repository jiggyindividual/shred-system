<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Shred System — Profile</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="/css/shared.css"/>
</head>
<body>
<div class="page-header">
  <div class="page-title">Profile</div>
  <button onclick="signOut()" style="font-size:12px;color:var(--muted);background:transparent;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;letter-spacing:0.04em">Sign out</button>
</div>

<div class="wrap">
  <div class="loader" id="loader"><div class="spinner"></div></div>
  <div id="content" style="display:none">

    <!-- Avatar + name -->
    <div style="display:flex;align-items:center;gap:1rem;margin-bottom:1.5rem">
      <div id="avatar" style="width:56px;height:56px;border-radius:50%;background:rgba(200,255,0,0.1);border:0.5px solid rgba(200,255,0,0.3);display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--accent)"></div>
      <div>
        <div style="font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:0.04em" id="profileName"></div>
        <div style="font-size:12px;color:var(--muted)" id="profileEmail"></div>
        <div style="font-size:11px;margin-top:3px"><span class="level-badge" id="profileTier"></span></div>
      </div>
    </div>

    <!-- Edit stats -->
    <div class="card">
      <div class="card-title" style="margin-bottom:1rem">Your stats</div>
      <div class="form-grid">
        <div class="form-group"><label>Name</label><input type="text" id="fName" placeholder="Your name"/></div>
        <div class="form-group"><label>Bodyweight (lbs)</label><input type="number" id="fBw" placeholder="215" step="0.1"/></div>
        <div class="form-group"><label>Daily TDEE (cal burned)</label><input type="number" id="fTdee" placeholder="3800"/></div>
        <div class="form-group"><label>Protein target (g/day)</label><input type="number" id="fProt" placeholder="210"/></div>
        <div class="form-group full"><label>Goal</label>
          <select id="fGoal">
            <option value="">Select goal</option>
            <option value="full shred — fat loss priority">Full shred — fat loss priority</option>
            <option value="recomp — lose fat build muscle">Recomp — lose fat + build muscle</option>
            <option value="lean bulk — muscle gain">Lean bulk — muscle gain</option>
            <option value="maintain and track">Maintain and track</option>
          </select>
        </div>
      </div>
      <button class="btn btn-accent" onclick="saveProfile()">Save changes</button>
    </div>

    <!-- Current month summary -->
    <div class="card">
      <div class="card-title" style="margin-bottom:1rem">This month</div>
      <div class="stat-grid" style="margin-bottom:0">
        <div class="stat-card"><div class="stat-label">Current level</div><div class="stat-val" id="sLevel">—</div></div>
        <div class="stat-card"><div class="stat-label">Days logged</div><div class="stat-val" id="sDays">—</div></div>
        <div class="stat-card"><div class="stat-label">Cum. deficit</div><div class="stat-val" id="sCumDef">—</div></div>
        <div class="stat-card"><div class="stat-label">Est. lost</div><div class="stat-val" id="sEstLbs">—</div></div>
      </div>
    </div>

    <!-- Archive list -->
    <div class="card">
      <div class="card-title" style="margin-bottom:1rem">Past months</div>
      <div id="archiveList"><div class="empty" style="padding:1rem 0">No past months archived yet</div></div>
    </div>

    <!-- Danger zone -->
    <div style="margin-bottom:2rem;padding:1rem;border:0.5px solid rgba(240,149,149,0.2)">
      <div style="font-size:13px;color:var(--bad);margin-bottom:0.5rem">Sign out</div>
      <div style="font-size:12px;color:var(--muted);margin-bottom:0.75rem">Your data is saved to your account and will be here when you come back.</div>
      <button class="btn btn-sm" onclick="signOut()" style="color:var(--bad);border-color:rgba(240,149,149,0.3)">Sign out</button>
    </div>

  </div>
</div>

<script src="/js/config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/nav.js"></script>
<script src="/js/levels.js"></script>
<script>
const sb=getClient();
const curMK=monthKey();
let uid;

(async()=>{
  const session=await requireAuth();if(!session)return;
  uid=session.user.id;
  const profile=await getProfile();
  if(!profile?.name){window.location.href='/onboarding.html';return;}

  // fill profile
  const initials=(profile.name||'?').split(' ').map(p=>p[0]).join('').substring(0,2).toUpperCase();
  document.getElementById('avatar').textContent=initials;
  document.getElementById('profileName').textContent=profile.name||'';
  document.getElementById('profileEmail').textContent=session.user.email||'';
  const te=document.getElementById('profileTier');
  const ld=genLevel(profile.current_level||1);
  te.textContent=`Level ${profile.current_level||1} — ${ld.name}`;
  te.className='level-badge '+tierClass(ld.tier);

  document.getElementById('fName').value=profile.name||'';
  document.getElementById('fBw').value=profile.bodyweight||'';
  document.getElementById('fTdee').value=profile.tdee||'';
  document.getElementById('fProt').value=profile.protein_target||'';
  document.getElementById('fGoal').value=profile.goal||'';
  document.getElementById('sLevel').textContent=profile.current_level||1;

  const {data:logs}=await sb.from('daily_logs').select('*').eq('user_id',uid).eq('month_key',curMK);
  const rows=computeRows(logs||[]);
  const daysLogged=rows.filter(r=>r.cal_in!=null||r.weight!=null).length;
  const last=rows[rows.length-1];
  document.getElementById('sDays').textContent=daysLogged;
  document.getElementById('sCumDef').innerHTML=last?(last.cumDef/1000).toFixed(1)+'<span class="stat-unit">k</span>':'—';
  document.getElementById('sEstLbs').innerHTML=last?Math.abs(last.estLbs).toFixed(1)+'<span class="stat-unit">lbs</span>':'—';

  const {data:arcs}=await sb.from('monthly_archives').select('*').eq('user_id',uid).order('month_key',{ascending:false});
  renderArchives(arcs||[]);

  document.getElementById('loader').style.display='none';
  document.getElementById('content').style.display='block';
  injectNav('profile');
})();

async function saveProfile() {
  const updates={
    name:document.getElementById('fName').value.trim(),
    bodyweight:parseFloat(document.getElementById('fBw').value)||null,
    tdee:parseInt(document.getElementById('fTdee').value)||null,
    protein_target:parseInt(document.getElementById('fProt').value)||null,
    goal:document.getElementById('fGoal').value||null
  };
  const {error}=await sb.from('profiles').update(updates).eq('id',uid);
  if(error){toast('Error saving','error');return;}
  toast('Profile saved');
  document.getElementById('profileName').textContent=updates.name;
  document.getElementById('avatar').textContent=updates.name.split(' ').map(p=>p[0]).join('').substring(0,2).toUpperCase();
}

function renderArchives(arcs) {
  const el=document.getElementById('archiveList');
  if(!arcs.length){el.innerHTML='<div class="empty" style="padding:0.5rem 0;text-align:left;font-size:13px;color:var(--muted)">No past months yet</div>';return;}
  el.innerHTML=arcs.map(a=>`
    <div style="padding:10px 0;border-bottom:0.5px solid var(--border)">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
        <div style="font-size:14px;font-weight:500">${monthLabel(a.month_key)}</div>
        <div style="font-size:11px;color:var(--muted)">L${a.level_start||'?'} → L${a.level_end||'?'}</div>
      </div>
      <div style="display:flex;gap:1.5rem;font-size:11px;color:var(--muted);flex-wrap:wrap">
        <span>Deficit <span style="color:var(--white)">${(a.total_deficit||0).toLocaleString()} cal</span></span>
        <span>Est lost <span style="color:var(--good)">${(a.est_lbs_lost||0).toFixed(1)} lbs</span></span>
        <span>Consistency <span style="color:var(--white)">${a.consistency_pct||0}%</span></span>
        <span>Streak <span style="color:var(--white)">${a.best_step_streak||0}d</span></span>
      </div>
    </div>`).join('');
}
</script>
</body>
</html>
