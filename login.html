<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Shred System — Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root{--black:#0a0a0a;--white:#f5f2ee;--accent:#c8ff00;--muted:#666;--card:#141414;--border:rgba(255,255,255,0.08);--input:#1a1a1a;--bad:#F09595}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--black);color:var(--white);font-family:'DM Sans',sans-serif;font-weight:300;min-height:100vh;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased}
.bg-grid{position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 59px,rgba(255,255,255,0.015) 59px,rgba(255,255,255,0.015) 60px),repeating-linear-gradient(90deg,transparent,transparent 59px,rgba(255,255,255,0.015) 59px,rgba(255,255,255,0.015) 60px);pointer-events:none}
.glow{position:fixed;top:-20%;left:-20%;width:600px;height:600px;background:radial-gradient(circle,rgba(200,255,0,0.04) 0%,transparent 60%);pointer-events:none}
nav{position:relative;z-index:10;padding:1.25rem 1.5rem;border-bottom:0.5px solid var(--border)}
.logo{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:0.08em;color:var(--accent);text-decoration:none}
.main{flex:1;display:flex;align-items:center;justify-content:center;padding:2rem 1.25rem;position:relative;z-index:10}
.auth-box{width:100%;max-width:400px}
.auth-title{font-family:'Bebas Neue',sans-serif;font-size:42px;letter-spacing:0.04em;margin-bottom:0.25rem}
.auth-sub{font-size:13px;color:var(--muted);margin-bottom:2rem}
.tabs{display:flex;border-bottom:0.5px solid var(--border);margin-bottom:1.75rem}
.tab{flex:1;font-size:13px;padding:10px;background:transparent;border:none;color:var(--muted);cursor:pointer;font-family:'DM Sans',sans-serif;border-bottom:2px solid transparent;letter-spacing:0.04em;transition:all 0.2s}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.form-group{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
.form-group label{font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted)}
.form-group input{font-size:15px;padding:13px 12px;background:var(--input);border:0.5px solid var(--border);color:var(--white);font-family:'DM Sans',sans-serif;outline:none;transition:border-color 0.2s;width:100%;-webkit-appearance:none;border-radius:0}
.form-group input:focus{border-color:rgba(200,255,0,0.5)}
.form-group input::placeholder{color:rgba(255,255,255,0.2)}
.btn-submit{width:100%;background:var(--accent);color:var(--black);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;padding:14px;border:none;cursor:pointer;letter-spacing:0.05em;margin-top:8px;transition:opacity 0.2s;-webkit-appearance:none;border-radius:0}
.btn-submit:active{opacity:0.85}
.btn-submit:disabled{opacity:0.45;cursor:not-allowed}
.error-msg{font-size:12px;color:var(--bad);margin-top:8px;min-height:18px;line-height:1.5}
.success-msg{font-size:12px;color:var(--accent);margin-top:8px;min-height:18px;line-height:1.5}
.free-note{text-align:center;font-size:12px;color:var(--muted);margin-top:1rem}
.free-note span{color:var(--accent)}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(0,0,0,0.3);border-top-color:#000;border-radius:50%;animation:spin 0.6s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="glow"></div>
<nav><a href="/index.html" class="logo">Shred System</a></nav>
<div class="main">
  <div class="auth-box">
    <div class="auth-title" id="authTitle">Welcome back.</div>
    <div class="auth-sub" id="authSub">Log in to your account</div>
    <div class="tabs">
      <button class="tab active" onclick="setTab('login',this)">Log in</button>
      <button class="tab" onclick="setTab('signup',this)">Sign up</button>
    </div>

    <!-- LOGIN -->
    <div id="loginForm">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="loginEmail" placeholder="you@example.com" autocomplete="email" autocapitalize="none"/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="loginPass" placeholder="••••••••" autocomplete="current-password"/>
      </div>
      <div class="error-msg" id="loginErr"></div>
      <button class="btn-submit" id="loginBtn" onclick="doLogin()">Log in</button>
    </div>

    <!-- SIGNUP -->
    <div id="signupForm" style="display:none">
      <div class="form-group">
        <label>Full name</label>
        <input type="text" id="signupName" placeholder="Your name" autocomplete="name" autocapitalize="words"/>
      </div>
      <div class="form-group">
        <label>Phone number</label>
        <input type="tel" id="signupPhone" placeholder="+1 (404) 000-0000" autocomplete="tel"/>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="signupEmail" placeholder="you@example.com" autocomplete="email" autocapitalize="none"/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="signupPass" placeholder="Min 6 characters" autocomplete="new-password"/>
      </div>
      <div class="error-msg" id="signupErr"></div>
      <div class="success-msg" id="signupOk" style="display:none"></div>
      <button class="btn-submit" id="signupBtn" onclick="doSignup()">Create account</button>
      <div class="free-note">Always <span>free</span> to use.</div>
    </div>
  </div>
</div>

<script src="/js/config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
// Init Supabase with persistence options
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
  auth: {
    persistSession: true,
    autoRefreshToken: true,
    detectSessionInUrl: true,
    storageKey: 'shred-system-auth'
  }
});

// If already logged in, redirect
(async () => {
  try {
    const { data: { session } } = await sb.auth.getSession();
    if (session) await redirectAfterAuth(session.user.id);
  } catch(e) { console.log('Session check:', e); }
})();

async function redirectAfterAuth(uid) {
  try {
    const { data } = await sb.from('profiles').select('name').eq('id', uid).single();
    if (!data || !data.name) {
      window.location.href = '/onboarding.html';
    } else {
      window.location.href = '/dashboard.html';
    }
  } catch(e) {
    window.location.href = '/onboarding.html';
  }
}

function setTab(tab, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('loginForm').style.display = tab === 'login' ? 'block' : 'none';
  document.getElementById('signupForm').style.display = tab === 'signup' ? 'block' : 'none';
  document.getElementById('authTitle').textContent = tab === 'login' ? 'Welcome back.' : 'Join the system.';
  document.getElementById('authSub').textContent = tab === 'login' ? 'Log in to your account' : 'Create your free account';
}

async function doLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const pass = document.getElementById('loginPass').value;
  const btn = document.getElementById('loginBtn');
  const err = document.getElementById('loginErr');

  err.textContent = '';
  if (!email || !pass) { err.textContent = 'Fill in both fields.'; return; }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Logging in...';

  try {
    const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });
    if (error) {
      err.textContent = error.message === 'Invalid login credentials'
        ? 'Wrong email or password. Try again.'
        : error.message;
      btn.disabled = false;
      btn.textContent = 'Log in';
      return;
    }
    btn.textContent = 'Redirecting...';
    await redirectAfterAuth(data.user.id);
  } catch(e) {
    err.textContent = 'Something went wrong. Try again.';
    btn.disabled = false;
    btn.textContent = 'Log in';
  }
}

async function doSignup() {
  const name = document.getElementById('signupName').value.trim();
  const phone = document.getElementById('signupPhone').value.trim();
  const email = document.getElementById('signupEmail').value.trim();
  const pass = document.getElementById('signupPass').value;
  const btn = document.getElementById('signupBtn');
  const err = document.getElementById('signupErr');
  const ok = document.getElementById('signupOk');

  err.textContent = '';
  ok.style.display = 'none';

  if (!name || !email || !pass) { err.textContent = 'Name, email and password are required.'; return; }
  if (pass.length < 6) { err.textContent = 'Password must be at least 6 characters.'; return; }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Creating account...';

  try {
    // Step 1: Create auth user
    const { data, error } = await sb.auth.signUp({ email, password: pass });

    if (error) {
      err.textContent = error.message;
      btn.disabled = false;
      btn.textContent = 'Create account';
      return;
    }

    if (!data.user) {
      err.textContent = 'Signup failed — try again.';
      btn.disabled = false;
      btn.textContent = 'Create account';
      return;
    }

    // Step 2: Insert profile row
    const profileData = {
      id: data.user.id,
      email: email,
      name: name,
      phone: phone || null,
      role: 'user',
      current_level: 1,
      start_level: 1
    };

    const { error: profileError } = await sb.from('profiles').insert(profileData);

    if (profileError) {
      // Profile might already exist (duplicate signup attempt) — try upsert
      await sb.from('profiles').upsert(profileData);
    }

    // Step 3: Check if email confirmation is required
    if (data.session) {
      // No email confirmation needed — go straight to onboarding
      btn.textContent = 'Redirecting...';
      window.location.href = '/onboarding.html';
    } else {
      // Email confirmation required
      btn.disabled = false;
      btn.textContent = 'Create account';
      ok.style.display = 'block';
      ok.textContent = 'Check your email to confirm your account, then log in.';
      // Switch to login tab
      setTimeout(() => {
        setTab('login', document.querySelectorAll('.tab')[0]);
        document.getElementById('loginEmail').value = email;
      }, 2000);
    }

  } catch(e) {
    console.error('Signup error:', e);
    err.textContent = 'Something went wrong. Try again.';
    btn.disabled = false;
    btn.textContent = 'Create account';
  }
}

// Enter key support
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const lf = document.getElementById('loginForm');
    if (lf.style.display !== 'none') doLogin(); else doSignup();
  }
});
</script>
</body>
</html>
